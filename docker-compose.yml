services:
  postgres:
    image: postgres:16-alpine
    container_name: mlms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlms}
      POSTGRES_USER: ${POSTGRES_USER:-mlms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlms_secret}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlms -d mlms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mlms:mlms_secret@postgres:5432/mlms}
      JWT_SECRET: ${JWT_SECRET:-bdDO2TkPX7YYNaEhwHrLwJSbbB8ZNcrVasiN54BBGDB}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-FR}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run start:dev"
    networks:
      - mlms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      PORT: ${FRONTEND_PORT:-5173}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - mlms-network

  analyzer-simulator:
    build:
      context: ./analyzer-simulator
      dockerfile: Dockerfile
    container_name: mlms-analyzer-simulator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "15000:5000"
      - "15001:5001"
      - "15002:5002"
    environment:
      WS_PORT: "5001"
      MLMS_API_URL: "http://backend:3000/api"
      SIMULATOR_EMAIL: "simulator@mlms.local"
      SIMULATOR_PASSWORD: "Sim1234!"
      LOG_LEVEL: "info"
    networks:
      - mlms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(5001,'localhost',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  analyzer-dashboard:
    build:
      context: ./analyzer-simulator/dashboard
      dockerfile: Dockerfile
    container_name: mlms-analyzer-dashboard
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      VITE_WS_URL: "ws://localhost:15001"
    networks:
      - mlms-network
    depends_on:
      - analyzer-simulator

volumes:
  postgres_data:

networks:
  mlms-network:
    driver: bridge
