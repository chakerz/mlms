services:
  postgres:
    image: postgres:16-alpine
    container_name: mlms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlms}
      POSTGRES_USER: ${POSTGRES_USER:-mlms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlms_secret}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlms -d mlms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mlms:mlms_secret@postgres:5432/mlms}
      JWT_SECRET: ${JWT_SECRET:-bdDO2TkPX7YYNaEhwHrLwJSbbB8ZNcrVasiN54BBGDB}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-FR}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run prisma:generate && npm run start:dev"
    networks:
      - mlms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mlms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      PORT: ${FRONTEND_PORT:-5173}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - mlms-network

volumes:
  postgres_data:

networks:
  mlms-network:
    driver: bridge
